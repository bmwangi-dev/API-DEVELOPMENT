services:
  api:
    build: .
    container_name: ${API_CONTAINER_NAME:-habittracker-api}
    environment:
      API_CONTAINER_PORT: ${API_CONTAINER_PORT:-8000}
      API_RELOAD: ${API_RELOAD:-true}
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-habittracker}:${POSTGRES_PASSWORD:-change-me-in-real-projects}@${POSTGRES_HOST:-db}:${POSTGRES_CONTAINER_PORT:-5432}/${POSTGRES_DB:-habittracker}
      POSTGRES_HOST: ${POSTGRES_HOST:-db}
      POSTGRES_PORT: ${POSTGRES_CONTAINER_PORT:-5432}
      SECRET_KEY: ${SECRET_KEY:-replace-with-a-long-random-secret}
      RUSTFS_ENDPOINT: ${RUSTFS_ENDPOINT:-http://rustfs:9000}
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      RUSTFS_BUCKET: ${RUSTFS_BUCKET:-habitapp}
      RUSTFS_HOST: ${RUSTFS_HOST:-rustfs}
      RUSTFS_PORT: ${RUSTFS_CONTAINER_PORT:-9000}
    ports:
      - "${API_PORT:-8000}:${API_CONTAINER_PORT:-8000}"
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      rustfs:
        condition: service_started
      rustfs-init:
        condition: service_completed_successfully
    restart: unless-stopped

  db:
    image: ${POSTGRES_IMAGE:-postgres:17-alpine}
    container_name: ${POSTGRES_CONTAINER_NAME:-habittracker-postgres}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-habittracker}
      POSTGRES_USER: ${POSTGRES_USER:-habittracker}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-real-projects}
    ports:
      - "${POSTGRES_PORT:-5433}:${POSTGRES_CONTAINER_PORT:-5432}"
    volumes:
      - postgres-data:${POSTGRES_DATA_DIR:-/var/lib/postgresql/data}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-habittracker} -d ${POSTGRES_DB:-habittracker}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  rustfs:
    image: ${RUSTFS_IMAGE:-rustfs/rustfs:latest}
    container_name: ${RUSTFS_CONTAINER_NAME:-habittracker-rustfs}
    environment:
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      RUSTFS_CONSOLE_ENABLE: ${RUSTFS_CONSOLE_ENABLE:-true}
      RUSTFS_ADDRESS: ${RUSTFS_BIND_HOST:-0.0.0.0}:${RUSTFS_CONTAINER_PORT:-9000}
      RUSTFS_CONSOLE_ADDRESS: ${RUSTFS_BIND_HOST:-0.0.0.0}:${RUSTFS_CONSOLE_CONTAINER_PORT:-9001}
      RUSTFS_VOLUMES: ${RUSTFS_DATA_DIR:-/data}
    ports:
      - "${RUSTFS_API_PORT:-9100}:${RUSTFS_CONTAINER_PORT:-9000}"
      - "${RUSTFS_CONSOLE_PORT:-9101}:${RUSTFS_CONSOLE_CONTAINER_PORT:-9001}"
    volumes:
      - rustfs-data:${RUSTFS_DATA_DIR:-/data}
    restart: unless-stopped

  rustfs-init:
    image: ${RUSTFS_INIT_IMAGE:-minio/mc:latest}
    container_name: ${RUSTFS_INIT_CONTAINER_NAME:-habittracker-rustfs-init}
    environment:
      RUSTFS_ALIAS: ${RUSTFS_ALIAS:-rustfs}
      RUSTFS_HOST: ${RUSTFS_HOST:-rustfs}
      RUSTFS_PORT: ${RUSTFS_CONTAINER_PORT:-9000}
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-rustfsadmin}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-rustfsadmin}
      RUSTFS_BUCKET: ${RUSTFS_BUCKET:-habitapp}
    depends_on:
      rustfs:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until mc alias set $$RUSTFS_ALIAS http://$$RUSTFS_HOST:$$RUSTFS_PORT $$RUSTFS_ACCESS_KEY $$RUSTFS_SECRET_KEY; do sleep 2; done;
      mc mb --ignore-existing $$RUSTFS_ALIAS/$$RUSTFS_BUCKET;
      "
    restart: "no"

volumes:
  postgres-data:
  rustfs-data:
